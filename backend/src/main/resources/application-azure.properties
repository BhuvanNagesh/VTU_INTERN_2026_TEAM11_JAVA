# Azure profile — loaded on Azure App Service when SPRING_PROFILES_ACTIVE=azure
# All secrets come from Azure App Service → Configuration → Application Settings

# Database Configuration (Supabase PostgreSQL — or Azure Database for PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=604800000

# Port — Azure App Service injects WEBSITES_PORT (default 8080)
server.port=${WEBSITES_PORT:8080}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS — Azure Static Web Apps URL + localhost for dev
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://your-app.azurestaticapps.net,http://localhost:5173}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Spring startup optimisations
spring.main.lazy-initialization=true
spring.main.banner-mode=off
spring.jmx.enabled=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# HikariCP — Azure App Service B1 has 1.75 GB RAM, more generous than Render free
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=-1

# Defer datasource initialization — let Spring Boot start even if DB is slow
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.com.wealthwise=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.web=WARN
