# Production profile — loaded on Render when SPRING_PROFILES_ACTIVE=prod
# All secrets come from Render Environment Variables dashboard

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=604800000

# Port — Render injects $PORT automatically
server.port=${PORT:8080}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://wealthwise-frontend-8xmb.onrender.com,http://localhost:5173}

# File upload limits — prevent OOM on large PDFs
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Spring startup optimisations — dramatically reduce cold-start time on Render
# Lazy init: beans created only on first use, not at startup (biggest win)
spring.main.lazy-initialization=true
spring.main.banner-mode=off

# Disable JMX — not needed in production, saves startup time
spring.jmx.enabled=false

# Hibernate: skip validation scan on startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# HikariCP — use min-idle=1 on Render free tier (don't hold unnecessary connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000

# ─── Logging — reduce Render log noise ────────────────────────
logging.level.com.wealthwise=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.org.springframework.web=WARN
