services:
  # ── Backend: Spring Boot (Docker) ───────────────────────────────────────────
  - type: web
    name: wealthwise-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      # Set the following secrets in the Render dashboard → Environment tab:
      # DB_URL         jdbc:postgresql://db.pkktouewaqhvnwahoktn.supabase.co:5432/postgres?sslmode=require
      # DB_USERNAME    postgres
      # DB_PASSWORD    <your supabase password>
      # JWT_SECRET     <min 32-char random string>
      # MAIL_USERNAME  bhuvannagesh2004@gmail.com
      # MAIL_PASSWORD  <gmail app password>
      # CORS_ALLOWED_ORIGINS  https://wealthwise-frontend-8xmb.onrender.com

  # ── Frontend: Vite / React (Static Site) ────────────────────────────────────
  - type: web
    name: wealthwise-frontend
    runtime: static
    staticPublishPath: ./project/dist
    buildCommand: cd project && npm ci && npm run build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://wealthwise-backend-zv5r.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://pkktouewaqhvnwahoktn.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
