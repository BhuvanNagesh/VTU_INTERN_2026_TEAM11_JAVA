# ─────────────────────────────────────────────────────────────────────────────
# WealthWise — Deploy React Frontend to Azure Static Web Apps
# Trigger: push to main branch (changes in project/ or staticwebapp.config.json)
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'project/**'
      - 'staticwebapp.config.json'
  workflow_dispatch:  # manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build & Deploy to Azure Static Web Apps ──────────────────────
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # ── App configuration ───────────────────────────────────────────
          app_location: "/project"           # React source code
          output_location: "dist"            # Vite build output
          skip_api_validation: true

        env:
          # Vite env vars injected at build time
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
