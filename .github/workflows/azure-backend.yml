# ─────────────────────────────────────────────────────────────────────────────
# WealthWise — Build & Deploy Spring Boot Backend to Azure App Service
# Uses OIDC (Federated Credentials) — no publish profile needed
# Trigger: push to main branch (changes in backend/) + manual
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend.yml'
  workflow_dispatch:  # manual trigger from GitHub Actions tab

env:
  AZURE_WEBAPP_NAME: wealthwise-backend
  JAVA_VERSION: '17'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ───────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Build with Maven (in backend/ subfolder) ─────────────────────
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./backend

      # ── 4. Login to Azure ───────────────────────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 5. Deploy JAR to Azure App Service ──────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: backend/target/wealthwise-backend-0.0.1-SNAPSHOT.jar
